<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Presentación VR - 8 de Marzo</title>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>

<a-scene>

<!-- Fondo -->
<a-sky color="#5e2a84"></a-sky>

<!-- Cámara con cursor -->
<a-entity camera position="0 1.6 0">
<a-cursor color="white"></a-cursor>
</a-entity>

<!-- Piso -->
<a-plane rotation="-90 0 0" width="30" height="30" color="#d8b4e2"></a-plane>

<!-- Cargar imágenes -->
<a-assets>
<img id="slide1" src="slide1.png">
<img id="slide2" src="slide2.png">
<img id="slide3" src="slide3.png">
<img id="slide4" src="slide4.png">
<img id="slide4" src="slide5.png">
<img id="slide4" src="slide6.png">
</a-assets>

<!-- Pantalla de diapositiva -->
<a-plane
id="slide"
position="0 2 -4"
width="2.4"
height="3"
src="#slide1">
</a-plane>

<!-- Título -->
<a-text
value="8 de Marzo\nDia Internacional de la Mujer"
font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
align="center"
color="white"
position="0 4 -4"
width="8">
</a-text>

<!-- Botón siguiente -->
<a-cylinder
id="nextButton"
position="2 1 -3"
radius="0.4"
height="0.2"
color="#ff4fa3">
</a-cylinder>

<a-text
value=">"
align="center"
color="white"
position="2 1.2 -2.8"
scale="2 2 2">
</a-text>

<!-- Botón anterior -->
<a-cylinder
id="prevButton"
position="-2 1 -3"
radius="0.4"
height="0.2"
color="#ff4fa3">
</a-cylinder>

<a-text
value="<"
align="center"
color="white"
position="-2 1.2 -2.8"
scale="2 2 2">
</a-text>

</a-scene>

<script>

let slides = ["#slide1","#slide2","#slide3","#slide4", "#slide5", "#slide6"];
let current = 0;

function updateSlide(){
document.querySelector("#slide").setAttribute("src", slides[current]);
}

document.querySelector("#nextButton").addEventListener("click", function(){
current++;
if(current >= slides.length){
current = 0;
}
updateSlide();
});

document.querySelector("#prevButton").addEventListener("click", function(){
current--;
if(current < 0){
current = slides.length - 1;
}
updateSlide();
});

</script>

</body>
</html>
