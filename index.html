  <!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Presentación VR</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>
<a-scene>

  <a-sky color="#6A0DAD"></a-sky>
  
  <!-- Cámara -->
  <a-entity camera look-controls position="0 1.6 0"></a-entity>

  <!-- Piso -->
  <a-plane rotation="-90 0 0" width="30" height="30" color="#C8A2C8"></a-plane>

  <!-- Título -->

  <!-- Slide 1 -->
  <a-plane
    id="slide"
    position="0 2 -4"
    width="4"
    height="2.5"
    src="slide1.jpg">
  </a-plane>

  <!-- Botón siguiente -->
<a-plane
position="2 1 -3"
width="1"
height="1"
color="#4B0082"
onclick="nextSlide()">
</a-plane>

<a-text
value=">"
position="1.9 1 -2.8"
align="center"
color="white"
scale="2 2 2">
</a-text>


</a-scene>

<script>

let slides = [
"slide1.png",
"slide2.png",
"slide3.png"
"slide4.png"
"slide5.png"
"slide6.png"
];

let current = 0;

function nextSlide(){
  current++;
  if(current >= slides.length){
    current = 0;
  }
  document.querySelector("#slide").setAttribute("src", slides[current]);
}

</script>

</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
